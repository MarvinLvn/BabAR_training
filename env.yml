name: phorec
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.8.12
  - pip=21.2.4
  - pytorch=1.13.1
  - torchaudio=0.13.1
  - torchvision=0.14.1
  - pytorch-lightning=1.8.6  # Last version with good 3.8 support
  - numpy=1.21.2
  - scipy=1.7.3
  - scikit-learn=1.0.2
  - pandas=1.4.1

  - librosa=0.9.2  # 0.10.0 might need newer Python
  - pysoundfile=0.10.3
  - resampy=0.2.2
  - audioread=2.1.9

  # Downgrade these to Python 3.8 compatible versions
  - transformers=4.21.0  # Last stable for 3.8
  - tokenizers=0.12.1
  - datasets=2.4.0
  - huggingface_hub=0.8.1
  - safetensors=0.2.8
  - sentencepiece=0.1.97
  - sacremoses=0.0.43

  - matplotlib=3.5.1
  - tensorboard=2.6.0
  - wandb=0.12.21  # 0.21.1 likely needs newer Python
  - jupyter=1.0.0
  - jupyterlab=3.4.8  # Not 4.3.8

  - pyyaml=6.0
  - tqdm=4.64.1
  - requests=2.28.1
  - fsspec=2022.8.2
  - filelock=3.4.2
  - packaging=21.3
  - click=8.1.3

  - pytest=7.1.1

  - pip
  - pip:
    - speechbrain==0.5.12  # 1.0.3 likely needs newer Python
    - simple-parsing==0.0.19.post0
    - phonemizer==3.2.1
    - panphon==0.19
    - editdistance==0.8.1
    - torchmetrics==0.11.4  # Compatible with Lightning 1.8.6
    - HyperPyYAML==1.2.2
    - segments==2.2.0
    - clldutils==3.10.1
    - csvw==2.0.0
    - pyDeprecate==0.3.1
    - overrides==7.7.0
    - rich==12.6.0  # 13.0.0 might need newer Python
    - colorlog==6.6.0
    - tabulate==0.8.9
    - soxr==0.3.2
    - xxhash==2.0.2
    - wget==3.2